<div class="container">
  <h2>Modifier Donation</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="montant">Montant</label>
      <input type="number" id="montant" class="form-control" [(ngModel)]="donation.montant" name="montant" required />
    </div>

    <div class="form-group">
      <label for="dateDon">Date de la Donation</label>
      <input type="date" id="dateDon" class="form-control" [(ngModel)]="donation.dateDon" name="dateDon" required />
    </div>

    <div class="form-group">
      <label for="nomBenificaire">Nom du Bénéficiaire</label>
      <input type="text" id="nomBenificaire" class="form-control" [(ngModel)]="donation.nomBenificaire" name="nomBenificaire" required />
    </div>

    <div class="form-group">
      <label for="nomDonneur">Nom du Donneur</label>
      <input type="text" id="nomDonneur" class="form-control" [(ngModel)]="donation.nomDonneur" name="nomDonneur" required />
    </div>

    <div class="form-group">
      <label for="typeDon">Type de Don</label>
      <select id="typeDon" class="form-control" [(ngModel)]="donation.typeDon" name="typeDon" required>
        <option value="ARGENT">ARGENT</option>
        <option value="MATERIEL">MATERIEL</option>
      </select>
    </div>

    <div class="form-group">
      <button type="submit" class="btn btn-primary">Mettre à jour</button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()">Annuler</button>
    </div>
  </form>
</div>
