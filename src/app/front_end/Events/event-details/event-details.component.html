<div class="container mt-4" *ngIf="event">
  <div class="card shadow-lg border-0 rounded">
    <div class="card-body">
      <h2 class="card-title text-primary text-center">{{ event.nomEvent }}</h2>
      <p class="card-text text-muted text-center">{{ event.description }}</p>
      
      <hr />

      <div class="row">
        <div class="col-md-6">
          <p><strong>Date:</strong> {{ event.dateEvent | date:'fullDate' }}</p>
          <p><strong>Lieu:</strong> {{ event.lieu }}</p>
        </div>
        <div class="col-md-6 text-md-end">
          <p class="fs-4"><strong>Prix:</strong> <span class="text-success">{{ event.prixevent }} dt</span></p>
        </div>
      </div>
    </div>
  </div>
</div>
